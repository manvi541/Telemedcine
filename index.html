<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Anil Kapoor's Clinic - Palia Kalan</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-color: #2a9d8f;
            --secondary-color: #264653;
            --whatsapp-color: #25D366;
            --background-color: #f4f6f8;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--secondary-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .location {
            margin-top: 0.5rem;
            opacity: 0.9;
        }

        .container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            color: var(--secondary-color);
            font-size: 1.4rem;
        }

        p {
            line-height: 1.5;
            color: #555;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #218377;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-whatsapp:hover {
            background-color: #1ebd54;
        }

        #statusMessage {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Dr. Anil Kapoor's Clinic</h1>
        <p class="location">📍 Palia Kalan | Digital Health Portal</p>
    </header>

    <main class="container">
        <section class="card whatsapp-card">
            <h2>💬 Need Instant Help?</h2>
            <p>Chat directly with Dr. Anil Kapoor's team via WhatsApp for instant support from home.</p>
            <button id="whatsappBtn" class="btn btn-whatsapp">Message on WhatsApp</button>
        </section>

        <section class="card booking-card">
            <h2>📅 Book an Appointment Quickly</h2>
            <p>Skip the crowded waiting rooms and reserve your virtual or in-person slot 24/7.</p>
            
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="patientName">Patient Full Name:</label>
                    <input type="text" id="patientName" required placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label for="patientPhone">Phone Number:</label>
                    <input type="tel" id="patientPhone" required placeholder="Enter mobile number">
                </div>

                <div class="form-group">
                    <label for="appointmentDate">Preferred Date:</label>
                    <input type="date" id="appointmentDate" required>
                </div>

                <div class="form-group">
                    <label for="symptoms">Briefly describe symptoms (Optional):</label>
                    <textarea id="symptoms" rows="3" placeholder="e.g., Fever, cough, asthma check-up..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Confirm Secure Booking</button>
            </form>
            <div id="statusMessage" class="hidden"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
