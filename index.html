<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Anil Kapoor's Clinic - Palia Kalan</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-color: #2a9d8f;
            --secondary-color: #264653;
            --background-color: #f4f6f8;
            --text-color: #333;
            --card-bg: #ffffff;
            --success-color: #2a9d8f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color); color: var(--text-color);
            margin: 0; padding: 0;
        }

        header {
            background-color: var(--secondary-color); color: white;
            text-align: center; padding: 1.5rem 1rem; position: relative;
        }

        header h1 { margin: 0; font-size: 1.8rem; }
        .location { margin-top: 0.5rem; opacity: 0.9; }

        .doctor-lock-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.2); color: white;
            border: 1px solid white; padding: 5px 12px;
            border-radius: 20px; cursor: pointer;
            font-size: 0.85rem; font-weight: bold; transition: 0.2s;
        }
        .doctor-lock-btn:hover { background: white; color: var(--secondary-color); }

        .nav-tabs {
            display: flex; justify-content: center;
            background: #e9ecef; padding: 0.5rem; gap: 10px;
        }

        .tab-btn {
            background: none; border: none; padding: 0.6rem 1.2rem;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            border-radius: 6px; color: var(--secondary-color); transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary-color); color: white; }

        .container { max-width: 550px; margin: 1.5rem auto; padding: 0 1rem; box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
        h2 { margin-top: 0; color: var(--secondary-color); font-size: 1.4rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; }
        
        input, textarea, select {
            width: 100%; padding: 0.75rem; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-size: 1rem; background-color: #fff;
        }

        .btn {
            width: 100%; padding: 0.85rem; border: none;
            border-radius: 6px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #218377; }

        .page-view { display: none; }
        .page-view.active { display: block; }

        .appointment-item {
            border-left: 5px solid var(--primary-color);
            background: #f8f9fa; padding: 1rem;
            margin-bottom: 0.75rem; border-radius: 4px;
        }
        .appointment-date { font-weight: bold; color: var(--secondary-color); font-size: 1.1rem; }
        .no-records { text-align: center; color: #777; font-style: italic; padding: 2rem 0; }

        /* SUCCESS STATUS SCREEN OVERLAY */
        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(38, 70, 83, 0.95); z-index: 9999;
            justify-content: center; align-items: center;
            flex-direction: column; color: white; text-align: center;
        }

        .success-checkmark {
            width: 80px; height: 80px; margin: 0 auto;
            background: var(--success-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .overlay h2 { color: white; font-size: 1.8rem; margin-top: 1.5rem; }
        .overlay p { font-size: 1.1rem; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="successOverlay" class="overlay">
        <div>
            <div class="success-checkmark">✓</div>
            <h2>Appointment Confirmed!</h2>
            <p>Data has been pushed directly to your Firebase server.</p>
        </div>
    </div>

    <header>
        <h1>Dr. Anil Kapoor's Clinic</h1>
        <p class="location">📍 Palia Kalan | Digital Health Portal</p>
        <button id="doctorAuthStatusBtn" class="doctor-lock-btn" onclick="handleDoctorAuthenticationToggle()">🔒 Doctor Portal</button>
    </header>

    <nav class="nav-tabs">
        <button class="tab-btn active" id="tab-booking" onclick="switchPage('bookingPage')">📅 Book Appointment</button>
        <button class="tab-btn" id="tab-calendar" onclick="switchPage('calendarPage')">👨‍⚕️ View Calendar / Queue</button>
    </nav>

    <main class="container">
        
        <div id="bookingPage" class="page-view active">
            <section class="card">
                <h2>📅 Book an Appointment</h2>
                <form id="appointmentForm">
                    <div class="form-group">
                        <label for="doctorSelect">Select Doctor / Department:</label>
                        <select id="doctorSelect" required>
                            <option value="Senior Doctor">Dr. Anil Kapoor (Senior Doctor)</option>
                            <option value="Dentist">Dental Department (Dentist)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="patientName">Patient Full Name:</label>
                        <input type="text" id="patientName" required placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label for="patientPhone">Phone Number:</label>
                        <input type="tel" id="patientPhone" required placeholder="Enter mobile number">
                    </div>
                    <div class="form-group">
                        <label for="appointmentDate">Preferred Date:</label>
                        <input type="date" id="appointmentDate" required>
                    </div>
                    <div class="form-group">
                        <label for="appointmentTime">Preferred Time Slot:</label>
                        <select id="appointmentTime" required>
                            <option value="" disabled selected>Select a time slot</option>
                            <option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
                            <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
                            <option value="12:00 PM - 01:00 PM">12:00 PM - 01:00 PM</option>
                            <option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
                            <option value="05:00 PM - 06:00 PM">05:00 PM - 06:00 PM</option>
                            <option value="06:00 PM - 07:00 PM">06:00 PM - 07:00 PM</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="symptoms">Symptoms (Optional):</label>
                        <textarea id="symptoms" rows="3" placeholder="e.g., Fever, cough..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Confirm Booking</button>
                </form>
            </section>
        </div>

        <div id="calendarPage" class="page-view">
            <section class="card">
                <h2>📆 Booked Appointments Queue</h2>
                <div id="calendarList">
                    <p class="no-records">Syncing files from cloud infrastructure...</p>
                </div>
            </section>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAoAdd3afb54fb27cfc18fa",
            authDomain: "palia-kalan-telehealth.firebaseapp.com",
            projectId: "palia-kalan-telehealth",
            storageBucket: "palia-kalan-telehealth.appspot.com",
            messagingSenderId: "860464920719",
            appId: "1:860464920719:web:a0add3afb54fb27cfc18fa"
        };

        // Complete initialization setup
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.addEventListener('DOMContentLoaded', () => {
            updateAuthBadgeDisplay();
            startLiveQueueSyncListener();
        });

        function updateAuthBadgeDisplay() {
            const btn = document.getElementById('doctorAuthStatusBtn');
            if (localStorage.getItem('doctorLoggedInForever') === 'true') {
                btn.textContent = "🔓 Doctor Logged In";
                btn.style.background = "#2a9d8f";
            } else {
                btn.textContent = "🔒 Doctor Portal";
                btn.style.background = "rgba(255, 255, 255, 0.2)";
            }
        }

        function handleDoctorAuthenticationToggle() {
            if (localStorage.getItem('doctorLoggedInForever') === 'true') {
                if (confirm("Log out of Doctor Mode?")) {
                    localStorage.removeItem('doctorLoggedInForever');
                    updateAuthBadgeDisplay();
                    switchPage('bookingPage');
                }
            } else {
                const pin = prompt("Enter Doctor Dashboard PIN:");
                if (pin === "1234") {
                    localStorage.setItem('doctorLoggedInForever', 'true');
                    updateAuthBadgeDisplay();
                    switchPage('calendarPage');
                } else {
                    alert("Incorrect Access PIN.");
                }
            }
        }

        function switchPage(pageId) {
            if (pageId === 'calendarPage') {
                const isAuth = localStorage.getItem('doctorLoggedInForever');
                if (isAuth !== 'true') {
                    const pin = prompt("Enter Access PIN (1234) to open dashboard logs:");
                    if (pin === "1234") {
                        localStorage.setItem('doctorLoggedInForever', 'true');
                        updateAuthBadgeDisplay();
                    } else {
                        alert("Access Denied.");
                        return;
                    }
                }
            }

            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            
            if (pageId === 'bookingPage') {
                document.getElementById('tab-booking').classList.add('active');
            } else if (pageId === 'calendarPage') {
                document.getElementById('tab-calendar').classList.add('active');
            }
        }

        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const appointmentData = {
                doctorType: String(document.getElementById('doctorSelect').value),
                patientName: String(document.getElementById('patientName').value),
                patientPhone: String(document.getElementById('patientPhone').value),
                appointmentDate: String(document.getElementById('appointmentDate').value),
                appointmentTime: String(document.getElementById('appointmentTime').value),
                symptoms: String(document.getElementById('symptoms').value || "None Logged"),
                createdAt: new Date().toISOString()
            };

            // FORCEFUL EXECUTION TRY BLOCK
            try {
                const docRef = await db.collection("appointments").add(appointmentData);
                console.log("Document successfully written with ID: ", docRef.id);

                document.getElementById('appointmentForm').reset();

                const overlay = document.getElementById('successOverlay');
                overlay.style.display = 'flex';

                setTimeout(() => {
                    overlay.style.display = 'none';
                    localStorage.setItem('doctorLoggedInForever', 'true');
                    updateAuthBadgeDisplay();
                    switchPage('calendarPage');
                }, 2000);

            } catch (error) {
                console.error("CRITICAL WRITE FAULT LOGGED:", error);
                // Hard modal fallback to force a diagnostic message to your screen
                alert("🚨 FIREBASE REJECTED WRITE!\n\nReason: " + error.message + "\n\nIf this says 'Missing or insufficient permissions', your console Cloud Rules are locked.");
            }
        });

        // LIVE REAL-TIME DATA STREAM MONITOR
        function startLiveQueueSyncListener() {
            const container = document.getElementById('calendarList');
            
            db.collection("appointments").onSnapshot((querySnapshot) => {
                container.innerHTML = "";
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p class="no-records">No appointments found in cloud database infrastructure.</p>';
                    return;
                }
                
                let records = [];
                querySnapshot.forEach((doc) => {
                    const res = doc.data();
                    records.push({
                        id: doc.id,
                        doctorType: String(res.doctorType || "Senior Doctor"),
                        patientName: String(res.patientName || "Anonymous"),
                        patientPhone: String(res.patientPhone || "No Phone"),
                        appointmentDate: String(res.appointmentDate || "Undated"),
                        appointmentTime: String(res.appointmentTime || "Not Selected"),
                        symptoms: String(res.symptoms || "None Logged")
                    });
                });

                records.sort((a, b) => a.appointmentDate.localeCompare(b.appointmentDate));

                records.forEach((data) => {
                    const item = document.createElement('div');
                    item.className = 'appointment-item';
                    item.innerHTML = `
                        <div class="appointment-date">🗓️ Date: ${data.appointmentDate} | ⏰ Time Slot: ${data.appointmentTime}</div>
                        <strong>Department/Doctor:</strong> ${data.doctorType}<br>
                        <strong>Patient Name:</strong> ${data.patientName}<br>
                        <strong>Contact Phone:</strong> ${data.patientPhone}<br>
                        <strong>Symptoms Logged:</strong> ${data.symptoms}<br>
                        <small style="color:#aaa;">Ref ID: ${data.id}</small>
                    `;
                    container.appendChild(item);
                });
            }, (error) => {
                console.error("CRITICAL READ FAULT LOGGED:", error);
                container.innerHTML = `<p class="no-records" style="color:red;">Firebase Sync Blocked: ${error.message}</p>`;
            });
        }
    </script>
</body>
</html>
