<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Anil Kapoor's Clinic - Telehealth</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-color: #2a9d8f;
            --secondary-color: #264653;
            --background-color: #f4f6f8;
            --text-color: #333;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 0; }
        header { background-color: var(--secondary-color); color: white; text-align: center; padding: 1.5rem 1rem; }
        header h1 { margin: 0; font-size: 1.8rem; }
        .nav-tabs { display: flex; justify-content: center; background: #e9ecef; padding: 0.5rem; gap: 10px; }
        .tab-btn { background: none; border: none; padding: 0.6rem 1.2rem; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 6px; color: var(--secondary-color); }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .container { max-width: 550px; margin: 1.5rem auto; padding: 0 1rem; box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 0.85rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; background-color: var(--primary-color); color: white; }
        .page-view { display: none; }
        .page-view.active { display: block; }
        .appointment-item { border-left: 5px solid var(--primary-color); background: #f8f9fa; padding: 1rem; margin-bottom: 0.75rem; border-radius: 4px; }
        .appointment-date { font-weight: bold; color: var(--secondary-color); font-size: 1.1rem; }
        .no-records { text-align: center; color: #777; font-style: italic; padding: 2rem 0; }
    </style>
</head>
<body>

    <header>
        <h1>Dr. Anil Kapoor's Clinic</h1>
        <p>📍 Palia Kalan | Digital Health Portal</p>
    </header>

    <nav class="nav-tabs">
        <button class="tab-btn active" id="tab-booking" onclick="switchPage('bookingPage')">📅 Book Appointment</button>
        <button class="tab-btn" id="tab-calendar" onclick="switchPage('calendarPage')">👨‍⚕️ View Queue</button>
    </nav>

    <main class="container">
        <div id="bookingPage" class="page-view active">
            <section class="card">
                <h2>📅 Book an Appointment</h2>
                <form id="appointmentForm">
                    <div class="form-group">
                        <label>Select Doctor:</label>
                        <select id="doctorSelect" required>
                            <option value="Dr. Anil Kapoor">Dr. Anil Kapoor (Senior Doctor)</option>
                            <option value="Dental Department">Dental Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Patient Full Name:</label>
                        <input type="text" id="patientName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number:</label>
                        <input type="tel" id="patientPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Preferred Date:</label>
                        <input type="date" id="appointmentDate" required>
                    </div>
                    <div class="form-group">
                        <label>Preferred Time Slot:</label>
                        <select id="appointmentTime" required>
                            <option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
                            <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
                            <option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Symptoms:</label>
                        <textarea id="symptoms" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn">Confirm Booking</button>
                </form>
            </section>
        </div>

        <div id="calendarPage" class="page-view">
            <section class="card">
                <h2>📆 Booked Appointments Queue</h2>
                <div id="calendarList"></div>
            </section>
        </div>
    </main>

    <script>
        // Your brand new updated credentials
        const firebaseConfig = {
            apiKey: "AIzaSyC2Xuciio91An3kPrMehsCjZzXP5NEgnYM",
            authDomain: "telemed-71cbc.firebaseapp.com",
            projectId: "telemed-71cbc",
            storageBucket: "telemed-71cbc.firebasestorage.app",
            messagingSenderId: "995995508803",
            appId: "1:995995508803:web:f1cfbda2e6c0e2e5e434f6",
            measurementId: "G-NH7SDRZEYZ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let appointmentsList = [];

        window.addEventListener('DOMContentLoaded', () => {
            setupRealtimeSync();
        });

        function switchPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'bookingPage') document.getElementById('tab-booking').classList.add('active');
            if(pageId === 'calendarPage') document.getElementById('tab-calendar').classList.add('active');
        }

        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const appointmentData = {
                doctorType: document.getElementById('doctorSelect').value,
                patientName: document.getElementById('patientName').value,
                patientPhone: document.getElementById('patientPhone').value,
                appointmentDate: document.getElementById('appointmentDate').value,
                appointmentTime: document.getElementById('appointmentTime').value,
                symptoms: document.getElementById('symptoms').value || "None",
                createdAt: new Date().toISOString()
            };

            try {
                // Instantly save directly into the new project database
                await db.collection("appointments").add(appointmentData);
                document.getElementById('appointmentForm').reset();
                alert("Appointment Confirmed and Saved Online!");
                switchPage('calendarPage');
            } catch (err) {
                console.error("Write error: ", err);
                alert("Database Error: " + err.message + "\n\nMake sure your new project's Firestore database rules are set to public test mode!");
            }
        });

        function setupRealtimeSync() {
            db.collection("appointments").onSnapshot((snapshot) => {
                appointmentsList = [];
                snapshot.forEach(doc => {
                    appointmentsList.push(doc.data());
                });
                renderAppointments();
            }, error => {
                console.error("Read connection failed: ", error);
            });
        }

        function renderAppointments() {
            const container = document.getElementById('calendarList');
            container.innerHTML = "";
            
            if (appointmentsList.length === 0) {
                container.innerHTML = '<p class="no-records">No appointments found in the cloud.</p>';
                return;
            }

            appointmentsList.sort((a, b) => a.appointmentDate.localeCompare(b.appointmentDate));

            appointmentsList.forEach((data) => {
                const item = document.createElement('div');
                item.className = 'appointment-item';
                item.innerHTML = `
                    <div class="appointment-date">🗓️ ${data.appointmentDate} | ⏰ Slot: ${data.appointmentTime}</div>
                    <strong>Doctor:</strong> ${data.doctorType}<br>
                    <strong>Patient:</strong> ${data.patientName}<br>
                    <strong>Phone:</strong> ${data.patientPhone}<br>
                    <strong>Symptoms:</strong> ${data.symptoms}
                `;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
